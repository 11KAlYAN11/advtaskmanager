# ?????????????????????????????????????????????????????????????????????????????
# TEST PROFILE ? active via @ActiveProfiles("test")
# Replaces PostgreSQL with H2 in-memory database
# schema.sql is DISABLED (PostgreSQL syntax not compatible with H2)
# ?????????????????????????????????????????????????????????????????????????????

# H2 in-memory database (PostgreSQL compatibility mode)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable schema.sql (PostgreSQL syntax not H2-compatible)
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Quieter SQL logs in tests (change to true for debugging)
spring.jpa.show-sql=false

# JWT ? short-lived token for fast test runs
jwt.secret=testSecretKeyForJUnitTestsPurposeOnlyDoNotUseInProd123
jwt.expiration=3600000

# AI ? stubbed (no real API calls in tests)
ai.base.url=http://localhost/mock-ai-stub
openai.api.key=test-key-not-real
openai.model=test-model

