# ????????????????????????????????????????????????????????????????????????????
#  PRODUCTION PROFILE  ?  activate with: --spring.profiles.active=prod
#  In Docker/K8s: set env var  SPRING_PROFILES_ACTIVE=prod
#  Secrets injected via env vars (never hardcode in prod!)
# ????????????????????????????????????????????????????????????????????????????

# ?? Database (injected from K8s Secret / Docker env) ?????????????????????????
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/taskmanager}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:changeme}

# ?? HikariCP tuning for Railway / Neon PostgreSQL ?????????????????????????
# Railway Postgres drops idle connections after ~300-600 s.
# max-lifetime MUST be shorter than the server idle-connection-timeout.
# keepalive-time sends a lightweight ping so connections stay alive.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=180000
spring.datasource.hikari.max-lifetime=540000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ?? JPA ? use update so Hibernate auto-creates tables on a fresh Neon DB ????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.format_sql=false
spring.jpa.defer-datasource-initialization=true

# ?? JWT (long secret from env) ????????????????????????????????????????????????
jwt.secret=${JWT_SECRET:REPLACE_WITH_STRONG_256BIT_SECRET_IN_PRODUCTION}
jwt.expiration=86400000

# ?? CORS ? set ALLOWED_ORIGINS env var in Railway to your Vercel URL ??????????
# Example: https://your-app.vercel.app,http://localhost:5173
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

# ?? AI ????????????????????????????????????????????????????????????????????????
ai.base.url=${AI_BASE_URL:https://api.groq.com/openai/v1/chat/completions}
openai.api.key=${OPENAI_API_KEY:REPLACE_WITH_YOUR_KEY}
openai.model=${AI_MODEL:llama-3.3-70b-versatile}

# ?? Actuator (restrict in prod ? prometheus scraped internally) ???????????????
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.root=WARN
logging.level.com.kalyan=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ?? Schema init (disable in prod ? let Hibernate validate only) ???????????????
spring.sql.init.mode=never

# ?? Swagger / OpenAPI (enabled in prod so the live API is self-documented) ????
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
