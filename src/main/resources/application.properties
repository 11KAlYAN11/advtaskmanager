spring.application.name=advtaskmanager

# ?? Database ??????????????????????????????????????????????????????????????????
# Fallback to local Postgres for dev; override via DB_URL in .env
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/taskmanager}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ?? Hibernate ?????????????????????????????????????????????????????????????????
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.deprecation=ERROR
logging.level.com.zaxxer.hikari=WARN
logging.level.org.springframework.security.config.annotation.authentication=ERROR
logging.level.root=INFO
logging.level.com.kalyan.advtaskmanager=INFO

# ?? Schema init ???????????????????????????????????????????????????????????????
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

# ?? JWT ? loaded from .env (JWT_SECRET) ??????????????????????????????????????
jwt.secret=${JWT_SECRET:dev-jwt-secret-replace-in-env-file}
jwt.expiration=86400000

# ?? CORS ??????????????????????????????????????????????????????????????????????
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173}

# ?? Actuator ??????????????????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true
management.info.env.enabled=true

# App info
info.app.name=Advanced Task Manager
info.app.version=1.0.0
info.app.description=Spring Boot + React Task Manager with JWT auth and AI assistant

# ?? AI ? loaded from .env (OPENAI_API_KEY, AI_BASE_URL, AI_MODEL) ????????????
ai.base.url=${AI_BASE_URL:https://api.groq.com/openai/v1/chat/completions}
openai.api.key=${OPENAI_API_KEY:your-groq-api-key-here}
openai.model=${AI_MODEL:llama-3.3-70b-versatile}

# ?? Swagger / OpenAPI ?????????????????????????????????????????????????????????
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
