spring.application.name=advtaskmanager

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/Employee
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP) ? tune for production
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# Hibernate Properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.format_sql=true

# Schema initialization
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

# JWT Configuration
jwt.secret=advTaskManagerJWTSecretKeyForAuthentication2024LongEnoughForHS256
jwt.expiration=86400000

# CORS ? allowed frontend origins (comma-separated)
# In production, set env var ALLOWED_ORIGINS to your Vercel URL
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173

# ?? Actuator (health checks, Prometheus metrics) ????????????????????????????
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true
management.info.env.enabled=true

# App info (shows in /actuator/info)
info.app.name=Advanced Task Manager
info.app.version=1.0.0
info.app.description=Spring Boot + React Task Manager with JWT auth and AI assistant

# ?? AI Configuration ?????????????????????????????????????????????????????????
# Using GROQ (free tier) ? get your key at https://console.groq.com
ai.base.url=https://api.groq.com/openai/v1/chat/completions
openai.api.key=${OPENAI_API_KEY:your-groq-api-key-here}
openai.model=llama-3.3-70b-versatile

